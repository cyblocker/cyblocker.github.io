<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ingress Orion 赛季计划工具</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;700&display=swap');

        body {
            font-family: 'Exo 2', sans-serif;
            background-color: #060a0f;
            color: #e2e8f0;
            background-image: radial-gradient(circle at 50% 50%, #101827 0%, #060a0f 100%);
            min-height: 100vh;
        }

        .ingress-card {
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid #1e293b;
            backdrop-filter: blur(8px);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .accent-blue {
            color: #60a5fa;
            text-shadow: 0 0 10px rgba(96, 165, 250, 0.5);
        }

        .accent-green {
            color: #4ade80;
            text-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
        }

        .accent-purple {
            color: #a78bfa;
            text-shadow: 0 0 10px rgba(167, 139, 250, 0.5);
        }

        .accent-orange {
            color: #fb923c;
            text-shadow: 0 0 10px rgba(251, 146, 60, 0.5);
        }

        .progress-bar-container {
            height: 12px;
            background: #1e293b;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
        }

        .progress-fill {
            height: 100%;
            transition: width 0.5s ease-in-out;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            box-shadow: 0 0 10px rgba(96, 165, 250, 0.8);
        }

        .badge-marker {
            position: absolute;
            top: -4px;
            width: 2px;
            height: 20px;
            background: #fff;
            z-index: 10;
        }

        input[type="number"] {
            background: #0f172a;
            border: 1px solid #334155;
            color: #f8fafc;
            padding: 6px 12px;
            border-radius: 4px;
            width: 100%;
            max-width: 180px;
            /* 增加宽度从 120px 到 180px */
        }

        input:focus {
            outline: none;
            border-color: #60a5fa;
            box-shadow: 0 0 5px rgba(96, 165, 250, 0.5);
        }

        .timestamp {
            font-size: 0.7rem;
            color: #64748b;
        }

        .bounty-hint {
            font-size: 0.75rem;
            color: #fb923c;
            margin-top: 4px;
        }

        .total-input-box {
            border: 2px solid #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }
    </style>
</head>

<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <!-- Header -->
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-bold accent-blue mb-2 tracking-wider">ORION 赛季计划工具</h1>
            <p class="text-slate-400">2026 Q2 (4/8 - 6/30)</p>
        </header>

        <!-- Main Input & Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="ingress-card p-4 rounded-xl text-center total-input-box">
                <div class="text-blue-400 text-sm font-bold mb-2 uppercase">输入游戏内当前总分</div>
                <input type="number" id="global-total-actual"
                    class="text-2xl font-bold bg-transparent border-none text-center focus:ring-0 w-full"
                    placeholder="点击输入" value="0" onchange="updateGlobalTotal(this.value)">
                <div class="text-[10px] text-slate-500 mt-1">Orion Season Tokens 统计值</div>
            </div>
            <div class="ingress-card p-4 rounded-xl text-center">
                <div class="text-slate-400 text-sm mb-1">计划最终获得区间</div>
                <div id="planned-total-range" class="text-xl md:text-2xl font-bold accent-blue">0 - 0</div>
                <div id="planned-status" class="text-xs text-slate-500 mt-1">根据潜力计算中...</div>
            </div>
            <div class="ingress-card p-4 rounded-xl text-center">
                <div class="text-slate-400 text-sm mb-1">下一等级还差</div>
                <div id="next-tier-diff" class="text-3xl font-bold accent-purple">0</div>
                <div id="next-tier-name" class="text-xs text-slate-500 mt-1">加载中...</div>
            </div>
        </div>

        <!-- Progress Bar -->
        <div class="ingress-card p-6 rounded-xl mb-8">
            <div class="relative h-20 mb-4 font-semibold uppercase tracking-widest">
                <!-- Bronze -->
                <div class="absolute text-center transition-all duration-300"
                    style="left: 20%; transform: translateX(-50%);">
                    <img src="static/orion/bronze.png"
                        class="w-10 h-10 mx-auto drop-shadow-[0_0_5px_rgba(205,127,50,0.5)]" alt="Bronze">
                    <span class="text-[10px] whitespace-nowrap mt-1 block">Bronze (5k)</span>
                </div>
                <!-- Silver -->
                <div class="absolute text-center transition-all duration-300"
                    style="left: 32%; transform: translateX(-50%);">
                    <img src="static/orion/silver.png"
                        class="w-10 h-10 mx-auto drop-shadow-[0_0_5px_rgba(192,192,192,0.5)]" alt="Silver">
                    <span class="text-[10px] whitespace-nowrap mt-1 block">Silver (8k)</span>
                </div>
                <!-- Gold -->
                <div class="absolute text-center transition-all duration-300"
                    style="left: 60%; transform: translateX(-50%);">
                    <img src="static/orion/gold.png" class="w-10 h-10 mx-auto drop-shadow-[0_0_5px_rgba(255,215,0,0.5)]"
                        alt="Gold">
                    <span class="text-[10px] whitespace-nowrap mt-1 block">Gold (15k)</span>
                </div>
                <!-- Platinum -->
                <div class="absolute text-center transition-all duration-300"
                    style="left: 100%; transform: translateX(-100%);">
                    <img src="static/orion/platinum.png"
                        class="w-10 h-10 mx-auto drop-shadow-[0_0_5px_rgba(229,228,226,0.5)]" alt="Platinum">
                    <span class="text-[10px] whitespace-nowrap mt-1 block">Platinum (25k)</span>
                </div>
            </div>
            <div class="progress-bar-container">
                <div class="badge-marker" style="left: 20%;"></div>
                <div class="badge-marker" style="left: 32%;"></div>
                <div class="badge-marker" style="left: 60%;"></div>
                <div class="badge-marker" style="left: 100%;"></div>
                <div id="main-progress-bar" class="progress-fill" style="width: 0%"></div>
            </div>
        </div>

        <!-- Activity Table -->
        <div class="ingress-card rounded-xl overflow-hidden mb-8">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-800/50">
                        <tr>
                            <th class="p-4 text-sm font-semibold text-slate-300 min-w-[200px]">活动项目</th>
                            <th class="p-4 text-sm font-semibold text-slate-300">单项最大值</th>
                            <th class="p-4 text-sm font-semibold text-slate-300">计划完成度</th>
                            <th class="p-4 text-sm font-semibold text-slate-300">实际完成(计算/输入)</th>
                            <th class="p-4 text-sm font-semibold text-slate-300">最后更新</th>
                        </tr>
                    </thead>
                    <tbody id="activity-body">
                        <!-- Rows -->
                    </tbody>
                </table>
            </div>
        </div>

        <footer class="text-center text-slate-500 text-sm mb-12">
            <p>来源：Ingress 2026 Q2 Orion 赛季说明。所有输入数据均在本地浏览器存储。</p>
            <p class="mt-2 opacity-50">每日任务得分 = 总分 - 其他项目实得分之和。</p>
        </footer>
    </div>

    <script>
        const TIERS = [
            { name: 'Bronze', value: 5000 },
            { name: 'Silver', value: 8000 },
            { name: 'Gold', value: 15000 },
            { name: 'Platinum', value: 25000 }
        ];

        // Season End Date: 2026-06-30
        const SEASON_END = new Date('2026-06-30T23:59:59');

        const ACTIVITIES = [
            { id: 'bounties', name: '每日任务 (Daily Bounties)', desc: '4/8 - 6/30 (84天), 每天满额 80 tokens', max: 6720, unit: 'tokens', isBounty: true },
            { id: 'ifs_apr', name: 'IFS - 四月', desc: '4/4 现场活动', max: 2500, unit: 'tokens' },
            { id: 'ifs_may', name: 'IFS - 五月', desc: '5/2 现场活动', max: 2500, unit: 'tokens' },
            { id: 'ifs_jun', name: 'IFS - 六月', desc: '6/6 现场活动', max: 2500, unit: 'tokens' },
            { id: 'op_sakura', name: 'Dispatch: 樱花祭', desc: '4/8 - 5/1 任务', max: 3000, unit: 'tokens' },
            { id: 'op_global', name: 'Orion 全球行动', desc: '4/25 - 5/12 任务', max: 7500, unit: 'tokens' },
            { id: 'op_may_late', name: 'Dispatch: 五月下旬', max: 3000, unit: 'tokens' },
            { id: 'op_solstice', name: 'Dispatch: 夏至', max: 3000, unit: 'tokens' },
            { id: 'anomaly', name: 'Anomaly 现场行动', desc: '现场完成全部任务', max: 5000, unit: 'tokens' }
        ];

        let userData = JSON.parse(localStorage.getItem('ingress_orion_planner_v3')) || {
            globalTotal: 0,
            activities: {}
        };

        function getRemainingBountyPotential() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const tomorrow = new Date(today);
            tomorrow.setDate(tomorrow.getDate() + 1);

            if (tomorrow > SEASON_END) return 0;
            const diffDays = Math.ceil((SEASON_END - tomorrow) / (1000 * 60 * 60 * 24));
            return Math.max(0, diffDays) * 80;
        }

        function init() {
            document.getElementById('global-total-actual').value = userData.globalTotal || 0;
            renderTable();
            calculate();
        }

        function renderTable() {
            const tbody = document.getElementById('activity-body');
            tbody.innerHTML = '';
            const potential = getRemainingBountyPotential();

            let otherActualSum = 0;
            ACTIVITIES.forEach(act => {
                if (!act.isBounty) {
                    otherActualSum += (userData.activities[act.id]?.actual || 0);
                }
            });

            const calculatedBounty = Math.max(0, userData.globalTotal - otherActualSum);

            ACTIVITIES.forEach(act => {
                const stored = userData.activities[act.id] || { planned: 0, actual: 0, lastUpdate: '-' };
                const row = document.createElement('tr');
                row.className = 'border-t border-slate-800 hover:bg-slate-800/30 transition-colors';

                let plannedInput = '';
                let actualInput = '';
                let hint = '';

                if (act.isBounty) {
                    plannedInput = `<span class="text-slate-600 italic text-sm">请见最终得分区间</span>`;
                    actualInput = `
                        <div class="flex flex-col">
                            <span class="text-green-400 font-mono font-bold text-lg">${calculatedBounty}</span>
                            <div class="text-[10px] text-slate-500 mt-1">约完成 ${Math.floor(calculatedBounty / 80)} 天</div>
                        </div>
                    `;
                    hint = `<div class="bounty-hint">明天起至季末最高还可得: ${potential} tokens</div>`;
                } else {
                    plannedInput = `
                        <input type="number" min="0" max="${act.max}" value="${stored.planned}" 
                               onchange="updateValue('${act.id}', 'planned', this.value)">
                    `;
                    actualInput = `
                        <input type="number" min="0" max="${act.max}" value="${stored.actual}" 
                               onchange="updateValue('${act.id}', 'actual', this.value)">
                    `;
                }

                row.innerHTML = `
                    <td class="p-4">
                        <div class="font-semibold text-slate-200">${act.name}</div>
                        <div class="text-xs text-slate-500">${act.desc || ''}</div>
                        ${hint}
                    </td>
                    <td class="p-4 text-slate-400 font-mono">${act.max}</td>
                    <td class="p-4">${plannedInput}</td>
                    <td class="p-4">${actualInput}</td>
                    <td class="p-4">
                        <div id="time-${act.id}" class="timestamp font-mono">${stored.lastUpdate}</div>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        window.updateGlobalTotal = function (val) {
            userData.globalTotal = parseInt(val) || 0;
            saveAndRefresh();
        }

        window.updateValue = function (id, type, value) {
            if (!userData.activities[id]) {
                userData.activities[id] = { planned: 0, actual: 0, lastUpdate: '-' };
            }

            userData.activities[id][type] = parseInt(value) || 0;

            const now = new Date();
            userData.activities[id].lastUpdate = now.toLocaleDateString() + ' ' + now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

            saveAndRefresh();
        };

        function saveAndRefresh() {
            localStorage.setItem('ingress_orion_planner_v3', JSON.stringify(userData));
            renderTable();
            calculate();
        }

        function calculate() {
            let totalActual = userData.globalTotal;
            let otherPlannedSum = 0;

            ACTIVITIES.forEach(act => {
                if (!act.isBounty) {
                    otherPlannedSum += (userData.activities[act.id]?.planned || 0);
                }
            });

            const potential = getRemainingBountyPotential();

            let otherActualSum = 0;
            ACTIVITIES.forEach(act => { if (!act.isBounty) otherActualSum += (userData.activities[act.id]?.actual || 0); });
            const currentBountyActual = Math.max(0, totalActual - otherActualSum);

            const plannedMin = otherPlannedSum + currentBountyActual;
            const plannedMax = plannedMin + potential;

            document.getElementById('planned-total-range').innerText = `${plannedMin.toLocaleString()} - ${plannedMax.toLocaleString()}`;

            let nextTier = TIERS.find(t => t.value > totalActual);
            const nextDiffEl = document.getElementById('next-tier-diff');
            if (!nextTier) {
                nextDiffEl.innerText = 'MAX';
                document.getElementById('next-tier-name').innerText = '已达成 Platinum!';
                nextDiffEl.className = 'text-3xl font-bold accent-green';
            } else {
                const diff = nextTier.value - totalActual;
                nextDiffEl.innerText = diff.toLocaleString();
                document.getElementById('next-tier-name').innerText = `距离 ${nextTier.name} 勋章`;
                nextDiffEl.className = 'text-3xl font-bold accent-purple';
            }

            let plannedTierMax = [...TIERS].reverse().find(t => t.value <= plannedMax);
            document.getElementById('planned-status').innerText = plannedTierMax ? `最高预计可获 ${plannedTierMax.name} 勋章` : '预计不足以获得勋章';

            const progressPercent = Math.min((totalActual / 25000) * 100, 100);
            document.getElementById('main-progress-bar').style.width = progressPercent + '%';
        }

        init();
    </script>
</body>

</html>
